<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Komp Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Login ─────────────────────────────────────────────────────── -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">⏱</div>
      <h1>Komp Tracker</h1>
      <p class="login-sub">Ange teamlösenordet för att logga in</p>
      <input
        type="password"
        id="password-input"
        placeholder="Lösenord"
        autocomplete="current-password"
      />
      <button id="login-btn" onclick="login()">Logga in</button>
      <p id="login-error" class="error-msg"></p>
    </div>
  </div>

  <!-- ── App ───────────────────────────────────────────────────────── -->
  <div id="app-screen" class="hidden">
    <header>
      <span class="header-title">⏱ Komp Tracker</span>
      <button class="btn-logout" onclick="logout()">Logga ut</button>
    </header>

    <main class="container">

      <!-- Chart card -->
      <div class="card">
        <div class="card-label">Översikt — kompsaldo per person</div>
        <div class="chart-wrap">
          <canvas id="balanceChart"></canvas>
        </div>
      </div>

      <!-- Members card -->
      <div class="card">
        <div class="card-header">
          <div class="card-label" style="margin-bottom:0">Kompsaldon</div>
          <div style="display:flex;gap:0.5rem">
            <button class="btn-ghost" onclick="openNewMemberModal()">+ Ny medlem</button>
            <button class="btn-primary" onclick="openModal(null, 'earned')">+ Lägg till komp</button>
          </div>
        </div>
        <div id="members-list"></div>
      </div>

      <!-- History card (hidden until member clicked) -->
      <div class="card hidden" id="history-card">
        <div class="card-header">
          <div class="card-label" style="margin-bottom:0" id="history-title">Historia</div>
          <button class="btn-ghost" onclick="closeHistory()">✕ Stäng</button>
        </div>
        <div id="entries-list"></div>
      </div>

      <!-- Archive card -->
      <div class="card archive-card">
        <div class="card-header archive-toggle" onclick="toggleArchive()">
          <div class="card-label" style="margin-bottom:0">Arkiv — tidigare teammedlemmar</div>
          <span id="archive-chevron" class="chevron">▶</span>
        </div>
        <div id="archive-body" class="hidden">
          <div id="archived-members-list"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- ── Add / Edit Modal ──────────────────────────────────────────── -->
  <div id="modal" class="modal-backdrop hidden" onclick="modalBackdropClick(event)">
    <div class="modal-box">
      <h2 class="modal-title">Lägg till komp</h2>

      <div class="form-group">
        <label>Person</label>
        <select id="entry-member"></select>
      </div>

      <div class="form-group">
        <label>Typ</label>
        <div class="radio-row">
          <label class="radio-label">
            <input type="radio" name="entry-type" value="earned" checked />
            <span class="radio-pill earned-pill">Intjänad</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="entry-type" value="taken" />
            <span class="radio-pill taken-pill">Uttag</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Datum</label>
        <input type="date" id="entry-date" />
      </div>

      <div class="form-group">
        <label>Antal timmar <span class="label-hint">(TT:MM, ex. 8:30)</span></label>
        <input type="text" id="entry-hours" placeholder="8:30" inputmode="numeric" />
      </div>

      <div class="form-group">
        <label>Kommentar <span class="label-hint">(valfri)</span></label>
        <input type="text" id="entry-comment" placeholder="ex. Beredskapsvecka v15" />
      </div>

      <p id="modal-error" class="error-msg"></p>

      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Avbryt</button>
        <button class="btn-primary" onclick="submitEntry()">Spara</button>
      </div>
    </div>
  </div>

  <!-- ── New Member Modal ─────────────────────────────────────────── -->
  <div id="new-member-modal" class="modal-backdrop hidden" onclick="if(event.target===this)closeNewMemberModal()">
    <div class="modal-box">
      <h2 class="modal-title">Lägg till ny medlem</h2>

      <div class="form-group">
        <label>Riktigt namn</label>
        <input type="text" id="new-member-name" />
      </div>

      <div class="form-group">
        <label>Smeknamn <span class="label-hint">(valfritt)</span></label>
        <input type="text" id="new-member-nick" />
      </div>

      <p id="new-member-error" class="error-msg"></p>

      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeNewMemberModal()">Avbryt</button>
        <button class="btn-primary" onclick="submitNewMember()">Lägg till</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
